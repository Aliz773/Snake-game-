<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  /* ── Theme variables ───────────────────────────────────── */
  :root {
    --bg:            #07070c;
    --overlay-bg:    rgba(7,7,12,0.72);
    --hud-color:     #e8e8e8;
    --diff-btn-bg:   rgba(255,255,255,0.06);
    --diff-btn-bdr:  rgba(255,255,255,0.14);
    --diff-btn-clr:  #bbb;
    --overlay-p:     rgba(255,255,255,0.65);
    --grid-line:     rgba(255,255,255,0.04);
    --icon-color:    #e8e8e8;
    --wm-color:      #ffffff;
    --wm-bg:         rgba(20,20,24,0.55);
    --wm-border:     rgba(255,255,255,0.22);
    --wm-inset:      rgba(255,255,255,0.15);
  }
  body.is-light {
    --bg:            #f0ede6;
    --overlay-bg:    rgba(240,237,230,0.82);
    --hud-color:     #1a1a1a;
    --diff-btn-bg:   rgba(0,0,0,0.06);
    --diff-btn-bdr:  rgba(0,0,0,0.18);
    --diff-btn-clr:  #333;
    --overlay-p:     rgba(0,0,0,0.55);
    --grid-line:     rgba(0,0,0,0.07);
    --icon-color:    #1a1a1a;
    --wm-color:      #ffffff;
    --wm-bg:         rgba(80,80,80,0.45);
    --wm-border:     rgba(255,255,255,0.3);
    --wm-inset:      rgba(255,255,255,0.25);
  }

  /* ── Base layout ───────────────────────────────────────── */
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Courier New', monospace;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-text-size-adjust: 100%;
    transition: background 0.3s ease;
  }
  body {
    flex-direction: column;
    padding: 12px;
    box-sizing: border-box;
    min-height: 100svh;
    gap: 10px;
    overflow-y: auto;
  }
  #wrap {
    position: relative;
    width: min(92vw, 72svh, 520px);
    aspect-ratio: 1 / 1;
    flex-shrink: 0;
  }
  body.is-fullscreen #wrap { width: min(95vw, 85svh, 700px); }
  body.is-fullscreen #hud  { width: min(95vw, 85svh, 700px); }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 8px;
  }
  #bg   { z-index: 0; }
  #game { z-index: 1; touch-action: none; }

  /* ── HUD ───────────────────────────────────────────────── */
  #hud {
    width: min(92vw, 72svh, 520px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--hud-color);
    font-size: clamp(13px, 4vw, 18px);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  #score, #best {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  #score {
    background: linear-gradient(135deg, #6ef08a, #4ecbb8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #best { color: #ffd24a; opacity: 0.9; }

  /* ── HUD icon buttons ──────────────────────────────────── */
  #muteBtn, #fullscreenBtn, #themeBtn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--icon-color);
    padding: 0 5px;
    line-height: 1;
    transition: color 0.2s ease;
  }

  /* ── Overlay ───────────────────────────────────────────── */
  #overlay {
    position: absolute;
    z-index: 3;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    background: var(--overlay-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 8px;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    transition: background 0.3s ease;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    margin: 0 0 10px;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #6ef08a 0%, #4ecbb8 50%, #a8f0ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #overlay p {
    margin: 3px 0;
    color: var(--overlay-p);
    font-size: 13px;
    font-weight: 400;
  }
  #overlay button {
    margin-top: 18px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    background: linear-gradient(135deg, #4ecb71, #3db89f);
    border: none;
    border-radius: 10px;
    color: #06210f;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(78,203,113,0.35);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  #overlay button:active {
    transform: scale(0.96);
    box-shadow: 0 2px 10px rgba(78,203,113,0.3);
  }

  /* ── Difficulty buttons ────────────────────────────────── */
  #diffRow {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diffBtn {
    padding: 8px 14px;
    font-size: 12.5px;
    font-weight: 600;
    background: var(--diff-btn-bg);
    border: 1px solid var(--diff-btn-bdr);
    border-radius: 20px;
    color: var(--diff-btn-clr);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .diffBtn.active {
    background: linear-gradient(135deg, #4ecb71, #3db89f);
    color: #06210f;
    border-color: transparent;
    font-weight: 700;
  }

  /* ── Speed bar ─────────────────────────────────────────── */
  #speedBar {
    width: min(92vw, 72svh, 520px);
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    flex-shrink: 0;
  }
  body.is-fullscreen #speedBar { width: min(95vw, 85svh, 700px); }
  body.is-light #speedBar { background: rgba(0,0,0,0.10); }
  #speedFill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #4ecb71, #4ecbb8);
    transition: width 0.12s ease, background 0.3s ease;
  }
  #speedFill.maxed {
    background: linear-gradient(90deg, #ff5d5d, #ff9d2a);
  }
  #watermark {
    position: fixed;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 800;
    color: var(--wm-color);
    letter-spacing: 0.5px;
    text-align: center;
    pointer-events: none;
    z-index: 50;
    padding: 10px 24px;
    border-radius: 999px;
    background: var(--wm-bg);
    border: 1.5px solid var(--wm-border);
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    box-shadow:
      inset 0 1px 0 var(--wm-inset),
      0 4px 16px rgba(0,0,0,0.4);
    white-space: nowrap;
    transition: background 0.3s ease, border-color 0.3s ease;
  }
</style>
</head>
<body>
<div id="hud">
  <span id="score">Score: 0</span>
  <span id="ghostTimer" style="display:none;color:#a8f0ff;">👻 0s</span>
  <button id="fullscreenBtn" title="Toggle fullscreen">⛶</button>
  <button id="themeBtn" title="Toggle theme">🌙</button>
  <button id="muteBtn" title="Toggle sound">🔊</button>
  <span id="best">Best: 0</span>
</div>
<div id="speedBar"><div id="speedFill"></div></div>
<div id="wrap">
  <canvas id="bg"></canvas>
  <canvas id="game"></canvas>
  <div id="overlay">
    <h1 id="overlayTitle">Snake</h1>
    <p>Arrows / WASD (any layout) / swipe</p>
    <p>Space to pause</p>
    <div id="diffRow">
      <button class="diffBtn" data-diff="easy">Easy</button>
      <button class="diffBtn" data-diff="medium">Medium</button>
      <button class="diffBtn" data-diff="hard">Hard</button>
      <button class="diffBtn" data-diff="iranian">Iranian</button>
    </div>
    <button id="startBtn">Start</button>
  </div>
</div>
<div id="watermark">Powered by Petros</div>


<script>
/* =========================================================
   WEBGL BACKGROUND LAYER — purely decorative animated glow.
   No game state lives here. If this throws, game still runs.
   ========================================================= */
(function initWebGLBackground() {
  const canvas = document.getElementById('bg');
  const gl = canvas.getContext('webgl');
  if (!gl) { canvas.style.display = 'none'; return; }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = canvas.clientWidth * dpr;
    const h = canvas.clientHeight * dpr;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  const vsSrc = `
    attribute vec2 aPos;
    void main() {
      gl_Position = vec4(aPos, 0.0, 1.0);
    }
  `;
  const fsSrc = `
    precision mediump float;
    uniform float uTime;
    uniform vec2 uResolution;
    uniform float uLight;
    void main() {
      vec2 uv = gl_FragCoord.xy / uResolution.xy;
      vec2 c = uv - 0.5;
      float d = length(c);
      float pulse = 0.5 + 0.5 * sin(uTime * 0.6);
      float glow = smoothstep(0.75, 0.0, d) * (0.20 + 0.08 * pulse);
      vec3 darkBase = vec3(0.027, 0.027, 0.047);
      vec3 darkTint = vec3(0.12, 0.30, 0.28) * glow;
      vec3 lightBase = vec3(0.94, 0.93, 0.90);
      vec3 lightTint = vec3(0.05, 0.20, 0.18) * glow * 0.5;
      vec3 base = mix(darkBase, lightBase, uLight);
      vec3 tint = mix(darkTint, lightTint, uLight);
      gl_FragColor = vec4(base + tint, 1.0);
    }
  `;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.warn('Shader compile error:', gl.getShaderInfoLog(s));
      gl.deleteShader(s);
      return null;
    }
    return s;
  }

  const vs = compile(gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  if (!vs || !fs) { canvas.style.display = 'none'; return; }

  const program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.warn('Program link error:', gl.getProgramInfoLog(program));
    canvas.style.display = 'none';
    return;
  }

  const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(program, 'aPos');
  const uTime = gl.getUniformLocation(program, 'uTime');
  const uRes = gl.getUniformLocation(program, 'uResolution');
  const uLight = gl.getUniformLocation(program, 'uLight');

  gl.useProgram(program);
  gl.enableVertexAttribArray(aPos);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  let raf = null;
  function frame(t) {
    resize();
    gl.uniform1f(uTime, t * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uLight, document.body.classList.contains('is-light') ? 1.0 : 0.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    raf = requestAnimationFrame(frame);
  }
  resize();
  raf = requestAnimationFrame(frame);

  window.addEventListener('resize', resize);
})();

/* =========================================================
   SOUND — synthesized via Web Audio API, no asset files.
   Lazily creates AudioContext on first user gesture (required
   by browser autoplay policies; Start button click satisfies this).
   ========================================================= */
const Sound = (function () {
  let ctx = null;
  let muted = false;

  function ensureCtx() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, durationMs, type, gainPeak, delay = 0) {
    if (muted) return;
    const c = ensureCtx();
    if (!c) return;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    const t0 = c.currentTime + delay;
    const dur = durationMs / 1000;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(gainPeak, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  return {
    init() { ensureCtx(); },
    setMuted(m) { muted = m; },
    isMuted() { return muted; },
    eat() { tone(660, 90, 'square', 0.12); tone(880, 90, 'square', 0.10, 0.06); },
    turn() { tone(220, 30, 'square', 0.03); },
    death() {
      tone(180, 160, 'sawtooth', 0.14);
      tone(140, 220, 'sawtooth', 0.12, 0.12);
      tone(90, 320, 'sawtooth', 0.12, 0.26);
    },
    win() {
      [523, 659, 784, 1047].forEach((f, i) => tone(f, 160, 'triangle', 0.1, i * 0.12));
    },
    click() { tone(440, 50, 'sine', 0.05); },
    speedUp() { tone(1000, 70, 'square', 0.08); }
  };
})();

/* =========================================================
   GAME LAYER — Canvas2D. All authoritative state lives here.
   ========================================================= */
(function initGame() {
  const DIFFICULTIES = {
    easy:    { grid: 16, step: 150, minStep: 100, speedupEvery: 5, speedupAmt: 3,  wrap: false, obstacles: 0,  label: 'Easy' },
    medium:  { grid: 20, step: 110, minStep: 70,  speedupEvery: 5, speedupAmt: 4,  wrap: false, obstacles: 0,  label: 'Medium' },
    hard:    { grid: 22, step: 85,  minStep: 50,  speedupEvery: 4, speedupAmt: 4,  wrap: false, obstacles: 0,  label: 'Hard' },
    iranian: { grid: 26, step: 110, minStep: 70,  speedupEvery: 3, speedupAmt: 4,  wrap: true,  obstacles: 14, label: 'Iranian' }
  };
  let currentDiff = 'medium';
  let GRID, STEP_MS, MIN_STEP_MS, SPEEDUP_EVERY, SPEEDUP_AMOUNT, WRAP, OBSTACLE_COUNT;

  function applyDifficulty(key) {
    currentDiff = key;
    const d = DIFFICULTIES[key];
    GRID = d.grid;
    STEP_MS = d.step;
    MIN_STEP_MS = d.minStep;
    SPEEDUP_EVERY = d.speedupEvery;
    SPEEDUP_AMOUNT = d.speedupAmt;
    WRAP = d.wrap;
    OBSTACLE_COUNT = d.obstacles;
  }
  applyDifficulty(currentDiff);

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const startBtn = document.getElementById('startBtn');
  const muteBtn = document.getElementById('muteBtn');
  const ghostTimerEl = document.getElementById('ghostTimer');
  const diffBtns = Array.from(document.querySelectorAll('.diffBtn'));

  diffBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.diff === currentDiff);
    btn.addEventListener('click', () => {
      if (paused) return; // don't let a paused mid-game switch silently reset the board
      Sound.init();
      Sound.click();
      diffBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyDifficulty(btn.dataset.diff);
      bestEl.textContent = 'Best: ' + getBest();
      resizeCanvas();
      resetState();
      render();
    });
  });

  muteBtn.addEventListener('click', () => {
    Sound.init();
    const m = !Sound.isMuted();
    Sound.setMuted(m);
    muteBtn.textContent = m ? '🔇' : '🔊';
  });

  // Theme toggle: 🌙 dark (default) ↔ ☀️ light
  // Persisted in localStorage so the user's preference survives reloads.
  const themeBtn = document.getElementById('themeBtn');
  let isLight = localStorage.getItem('snakeTheme') === 'light';

  function applyThemeCSS() {
    // Only touches DOM/CSS — safe to call before game state is initialized.
    document.body.classList.toggle('is-light', isLight);
    themeBtn.textContent = isLight ? '☀️' : '🌙';
    themeBtn.title = isLight ? 'Switch to dark mode' : 'Switch to light mode';
    localStorage.setItem('snakeTheme', isLight ? 'light' : 'dark');
  }

  function applyTheme() {
    applyThemeCSS();
    // Canvas calls require game state (paused, running, dpr etc.) to exist.
    // Only call this after initGame() has fully run.
    resizeCanvas();
    if (!running) render();
  }

  applyThemeCSS(); // apply saved CSS preference immediately — no game state needed

  themeBtn.addEventListener('click', () => {
    Sound.init();
    Sound.click();
    isLight = !isLight;
    applyTheme(); // full apply fine here — game state exists by click time
  });

  // Fullscreen toggle. Targets the whole document, not just the canvas, so
  // the entire page (HUD, board, overlay) goes fullscreen together. Feature
  // detection covers vendor-prefixed variants on older Android WebViews;
  // if no variant exists (notably iOS Safari for plain pages), the button
  // is hidden entirely rather than shown and silently failing on tap.
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const fsEl = document.documentElement;
  const requestFS = fsEl.requestFullscreen || fsEl.webkitRequestFullscreen || fsEl.msRequestFullscreen;
  const exitFS = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  const fsSupported = !!(requestFS && exitFS);

  if (!fsSupported) {
    fullscreenBtn.style.display = 'none';
  } else {
    fullscreenBtn.addEventListener('click', () => {
      Sound.init();
      Sound.click();
      const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
      if (isFs) {
        (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
      } else {
        (fsEl.requestFullscreen || fsEl.webkitRequestFullscreen || fsEl.msRequestFullscreen).call(fsEl).catch(() => {
          // Some browsers reject the promise if not triggered by a direct
          // user gesture in their eyes; fail silently rather than throwing
          // an unhandled error into the console mid-game.
        });
      }
    });
    const syncFsIcon = () => {
      const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
      fullscreenBtn.textContent = isFs ? '✕' : '⛶';
      fullscreenBtn.title = isFs ? 'Exit fullscreen' : 'Enter fullscreen';
      document.body.classList.toggle('is-fullscreen', !!isFs);
      resizeCanvas();
      render();
    };
    document.addEventListener('fullscreenchange', syncFsIcon);
    document.addEventListener('webkitfullscreenchange', syncFsIcon);
  }

  let cell = 0;       // px per cell, computed on resize
  let dpr = 1;

  function resizeCanvas() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const size = canvas.clientWidth; // square, css-driven
    canvas.width = Math.round(size * dpr);
    canvas.height = Math.round(size * dpr);
    cell = canvas.width / GRID;
  }
  window.addEventListener('resize', resizeCanvas);

  // ---- State ----
  let snake;            // array of {x,y}, index 0 = head
  let prevSnake;         // snapshot of snake positions before the last tick, used only for render-time interpolation — never read by game logic
  let dir;               // current movement direction {x,y}
  let queuedDirs;         // input buffer, max 2 deep, to prevent double-turn-into-self bug
  let food;
  let obstacles;         // array of {x,y}, only populated in Iranian mode
  let score;
  let stepMs;
  let acc = 0;
  let lastTs = 0;
  let running = false;
  let paused = false;
  let gameOver = false;
  let rafId = null;

  // Purely cosmetic animation timestamps (performance.now()-based), read only
  // by render(). None of these influence collisions, scoring, or timing.
  const SPAWN_POP_MS = 220;
  let foodSpawnAt = 0;
  let eatPopAt = 0;       // last time food/powerup was eaten, for a brief burst at that cell
  let eatPopCell = null;  // {x,y} where the last pop should render

  // Game-over death animation state — purely visual, logic already resolved
  const DEATH_ANIM_MS = 600; // total duration of collapse animation
  let deathAnimAt = 0;       // performance.now() when death animation started, 0 = inactive
  let deathSnakeSnapshot = null; // frozen copy of snake at moment of death for animation

  const speedFill = document.getElementById('speedFill');

  // Iranian-mode powerups. Both spawn as collectibles on the board (not
  // automatic) and only exist when WRAP is true (Iranian is the only mode
  // with obstacles for ghost to matter, and we don't want stray powerups
  // confusing the other three modes which were never designed around them).
  const GHOST_INTERVAL_MS = 30000;
  const GHOST_DURATION_MS = 15000;
  const BONUS_INTERVAL_MS = 60000;
  const BONUS_POINTS = 10;
  let ghostPowerup = null;     // {x,y} on board, or null
  let bonusPowerup = null;     // {x,y} on board, or null
  let ghostSpawnAt = 0;
  let bonusSpawnAt = 0;
  let ghostSpawnTimer = 0;     // ms elapsed since last ghost spawn opportunity
  let bonusSpawnTimer = 0;
  let ghostActiveMs = 0;       // remaining ms of active ghost effect, 0 = inactive

  function bestKey() { return 'snakeBest_' + currentDiff; }
  function getBest() { return Number(localStorage.getItem(bestKey()) || 0); }
  function setBest(v) { localStorage.setItem(bestKey(), String(v)); }

  bestEl.textContent = 'Best: ' + getBest();

  function resetState() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
      { x: mid - 3, y: mid }
    ];
    dir = { x: 1, y: 0 };
    prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
    queuedDirs = [];
    score = 0;
    stepMs = STEP_MS;
    acc = 0;
    gameOver = false;
    paused = false;
    ghostPowerup = null;
    bonusPowerup = null;
    ghostSpawnAt = 0;
    bonusSpawnAt = 0;
    ghostSpawnTimer = 0;
    bonusSpawnTimer = 0;
    ghostActiveMs = 0;
    foodSpawnAt = performance.now();
    eatPopAt = 0;
    eatPopCell = null;
    deathAnimAt = 0;
    deathSnakeSnapshot = null;
    ghostTimerEl.style.display = 'none';
    speedFill.style.width = '0%';
    speedFill.classList.remove('maxed');
    placeObstacles();
    placeFood();
    scoreEl.textContent = 'Score: 0';
  }

  function placeObstacles() {
    obstacles = [];
    if (!OBSTACLE_COUNT) return;
    // Keep a clear buffer zone around the snake's starting row so the player
    // doesn't die on tick 1 before they've even had a chance to react.
    const mid = Math.floor(GRID / 2);
    const safeZone = new Set();
    for (let x = mid - 4; x <= mid + 2; x++) {
      for (let y = mid - 2; y <= mid + 2; y++) {
        safeZone.add(x + ',' + y);
      }
    }
    const candidates = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        const k = x + ',' + y;
        if (!safeZone.has(k)) candidates.push({ x, y });
      }
    }
    // Shuffle (Fisher-Yates) then take the first N — uniform without replacement.
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    obstacles = candidates.slice(0, Math.min(OBSTACLE_COUNT, candidates.length));
  }

  // Shared by food/powerup placement so nothing ever spawns on top of the
  // snake, obstacles, or another already-placed collectible.
  function occupiedCells() {
    const occ = new Set(snake.map(s => s.x + ',' + s.y));
    obstacles.forEach(o => occ.add(o.x + ',' + o.y));
    if (food) occ.add(food.x + ',' + food.y);
    if (ghostPowerup) occ.add(ghostPowerup.x + ',' + ghostPowerup.y);
    if (bonusPowerup) occ.add(bonusPowerup.x + ',' + bonusPowerup.y);
    return occ;
  }

  function randomFreeCell(excludeSet) {
    const free = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        const k = x + ',' + y;
        if (!excludeSet.has(k)) free.push({ x, y });
      }
    }
    if (free.length === 0) return null;
    return free[Math.floor(Math.random() * free.length)];
  }

  function placeFood() {
    // Guaranteed valid placement: build free-cell list, pick uniformly.
    // Avoids infinite random-retry loops when snake nearly fills the board.
    food = null; // exclude old food from its own occupied check
    food = randomFreeCell(occupiedCells());
    if (food) foodSpawnAt = performance.now();
  }

  function trySpawnGhostPowerup() {
    if (ghostPowerup) return; // one at a time
    ghostPowerup = randomFreeCell(occupiedCells());
    if (ghostPowerup) ghostSpawnAt = performance.now();
  }

  function trySpawnBonusPowerup() {
    if (bonusPowerup) return;
    bonusPowerup = randomFreeCell(occupiedCells());
    if (bonusPowerup) bonusSpawnAt = performance.now();
  }

  function checkWin() {
    return snake.length >= (GRID * GRID - obstacles.length);
  }

  // ---- Input ----
  // Bound by event.code (physical key position), NOT event.key (character).
  // This makes WASD work identically regardless of keyboard layout —
  // Persian, English, or anything else — since .code reports the physical
  // key pressed, not the glyph it produces. Arrow keys are layout-independent
  // by nature and included for the same physical keys regardless of layout.
  const CODE_DIRS = {
    ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 }
  };

  function queueDir(nd) {
    if (!nd) return;
    // Reference direction = last queued dir, or current dir if queue empty.
    // Prevents queuing two turns in one tick that combine into a 180 reversal
    // (e.g. queued Up then Left while still processing Right -> would hit neck).
    const ref = queuedDirs.length ? queuedDirs[queuedDirs.length - 1] : dir;
    const isReverse = nd.x === -ref.x && nd.y === -ref.y;
    const isSame = nd.x === ref.x && nd.y === ref.y;
    if (isReverse || isSame) return;
    if (queuedDirs.length < 2) queuedDirs.push(nd);
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (running && !gameOver) togglePause();
      return;
    }
    const nd = CODE_DIRS[e.code];
    if (nd) {
      e.preventDefault();
      if (!running) return;
      queueDir(nd);
    }
  });

  // Touch swipe support — bound to the whole document (not just the canvas)
  // so a swipe anywhere on screen steers the snake, and detected on
  // touchmove rather than touchend so the direction fires the instant the
  // gesture's intent is clear, not after the finger lifts. This removes the
  // "wait for finger release" latency that touchend-based detection had.
  const SWIPE_THRESHOLD = 16; // px of movement before a direction is committed
  let touchStart = null;
  let swipeFired = false; // true once this gesture has already triggered a turn

  document.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
    swipeFired = false;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!touchStart || swipeFired || !running) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_THRESHOLD) return;
    swipeFired = true; // lock: ignore the rest of this gesture's movement
    if (Math.abs(dx) > Math.abs(dy)) {
      queueDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
    } else {
      queueDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    touchStart = null;
    swipeFired = false;
  }, { passive: true });

  function togglePause() {
    paused = !paused;
    if (paused) {
      document.getElementById('diffRow').style.display = 'none';
      showOverlay('Paused', 'Resume');
    } else {
      hideOverlay();
      lastTs = performance.now(); // avoid huge delta jump after resume
    }
  }

  // ---- Tick / simulation ----
  function tick() {
    // Snapshot current positions before mutating, so render() can interpolate
    // between this and the post-tick positions. Render-only; no logic reads this.
    prevSnake = snake.map(s => ({ x: s.x, y: s.y }));

    if (queuedDirs.length) {
      dir = queuedDirs.shift();
      Sound.turn();
    }

    const head = snake[0];
    let nx = head.x + dir.x;
    let ny = head.y + dir.y;

    if (WRAP) {
      // Iranian mode: walls wrap instead of killing.
      nx = (nx + GRID) % GRID;
      ny = (ny + GRID) % GRID;
    } else if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
      return endGame();
    }

    // Obstacle collision (Iranian mode only — obstacles is empty elsewhere).
    // Suppressed while ghost effect is active, by design.
    if (ghostActiveMs <= 0) {
      for (let i = 0; i < obstacles.length; i++) {
        if (obstacles[i].x === nx && obstacles[i].y === ny) {
          return endGame();
        }
      }
    }

    // Self collision: check against body, but the tail cell is allowed
    // because it will vacate this same tick (unless we're about to eat,
    // in which case the tail does NOT move, so it must stay blocked).
    const willEat = food && nx === food.x && ny === food.y;
    const bodyToCheck = willEat ? snake : snake.slice(0, -1);
    for (let i = 0; i < bodyToCheck.length; i++) {
      if (bodyToCheck[i].x === nx && bodyToCheck[i].y === ny) {
        return endGame();
      }
    }

    snake.unshift({ x: nx, y: ny });

    // Powerup pickups: do NOT grow the snake (unlike food), so tail still
    // pops normally. Checked before the food branch's pop/no-pop decision.
    let ateFood = willEat;
    if (ghostPowerup && nx === ghostPowerup.x && ny === ghostPowerup.y) {
      eatPopCell = { x: ghostPowerup.x, y: ghostPowerup.y };
      eatPopAt = performance.now();
      ghostPowerup = null;
      ghostActiveMs = GHOST_DURATION_MS;
      Sound.speedUp(); // reuse as a distinct pickup chime
    }
    if (bonusPowerup && nx === bonusPowerup.x && ny === bonusPowerup.y) {
      eatPopCell = { x: bonusPowerup.x, y: bonusPowerup.y };
      eatPopAt = performance.now();
      bonusPowerup = null;
      score += BONUS_POINTS;
      scoreEl.textContent = 'Score: ' + score;
      Sound.win(); // short ascending chime, reused for a bonus pickup feel
    }

    if (ateFood) {
      eatPopCell = { x: nx, y: ny };
      eatPopAt = performance.now();
      score++;
      scoreEl.textContent = 'Score: ' + score;
      Sound.eat();
      if (score % SPEEDUP_EVERY === 0) {
        stepMs = Math.max(MIN_STEP_MS, stepMs - SPEEDUP_AMOUNT);
        Sound.speedUp();
      }
      // Update speed bar — shows progress toward next speed-up
      const atMax = stepMs <= MIN_STEP_MS;
      const progressInCycle = score % SPEEDUP_EVERY;
      const pct = atMax ? 100 : (progressInCycle / SPEEDUP_EVERY) * 100;
      speedFill.style.width = pct + '%';
      speedFill.classList.toggle('maxed', atMax);
      if (checkWin()) {
        return endGame(true);
      }
      placeFood();
    } else {
      snake.pop();
    }
  }

  function endGame(won) {
    running = false;
    gameOver = true;
    const best = getBest();
    if (score > best) {
      setBest(score);
      bestEl.textContent = 'Best: ' + score;
    }
    if (won) {
      Sound.win();
      showOverlay('You Win!', 'Play Again',
        `Score: ${score}  •  Best: ${Math.max(score, best)}  •  ${DIFFICULTIES[currentDiff].label}`);
    } else {
      Sound.death();
      // Snapshot snake for death animation, then delay overlay until it finishes
      deathSnakeSnapshot = snake.map(s => ({ x: s.x, y: s.y }));
      deathAnimAt = performance.now();
      // Keep render loop running during animation via a dedicated animation loop
      const animLoop = () => {
        const elapsed = performance.now() - deathAnimAt;
        render();
        if (elapsed < DEATH_ANIM_MS) {
          requestAnimationFrame(animLoop);
        } else {
          deathAnimAt = 0;
          deathSnakeSnapshot = null;
          showOverlay('Game Over', 'Play Again',
            `Score: ${score}  •  Best: ${Math.max(score, best)}  •  ${DIFFICULTIES[currentDiff].label}`);
        }
      };
      requestAnimationFrame(animLoop);
    }
  }

  // ---- Render ----
  // Ease-out scale-in factor (0 to 1) for an item that spawned `spawnAt` ms
  // ago. Used to make food/powerups "pop" into existence instead of
  // appearing instantly.
  function spawnScale(spawnAt) {
    if (!spawnAt) return 1;
    const elapsed = performance.now() - spawnAt;
    if (elapsed >= SPAWN_POP_MS) return 1;
    const p = elapsed / SPAWN_POP_MS;
    return 1 - Math.pow(1 - p, 3); // cubic ease-out
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid — color adapts to current theme
    const gridColor = isLight ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.04)';
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, canvas.height);
      ctx.moveTo(0, i * cell); ctx.lineTo(canvas.width, i * cell);
      ctx.stroke();
    }

    // obstacles (Iranian mode) — rendered with reduced opacity while ghost
    // is active, to visually communicate "you can pass through these now"
    if (obstacles.length) {
      ctx.fillStyle = ghostActiveMs > 0
        ? (isLight ? 'rgba(100,80,60,0.20)' : 'rgba(90,74,58,0.35)')
        : (isLight ? '#7a5c3a' : '#5a4a3a');
      ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      obstacles.forEach(o => {
        const px = o.x * cell, py = o.y * cell;
        const pad = cell * 0.04;
        ctx.fillRect(px + pad, py + pad, cell - pad * 2, cell - pad * 2);
        ctx.strokeRect(px + pad, py + pad, cell - pad * 2, cell - pad * 2);
      });
    }

    // ghost powerup — pulsing pale cyan diamond, with pop-in scale on spawn
    if (ghostPowerup) {
      const gx = ghostPowerup.x * cell + cell / 2;
      const gy = ghostPowerup.y * cell + cell / 2;
      const pulse = 0.75 + 0.25 * Math.sin(performance.now() / 180);
      const pop = spawnScale(ghostSpawnAt);
      const r = cell * 0.34 * pulse * pop;
      ctx.fillStyle = 'rgba(150, 230, 255, 0.85)';
      ctx.beginPath();
      ctx.moveTo(gx, gy - r); ctx.lineTo(gx + r, gy);
      ctx.lineTo(gx, gy + r); ctx.lineTo(gx - r, gy);
      ctx.closePath();
      ctx.fill();
    }

    // bonus powerup — gold burst, with pop-in scale on spawn
    if (bonusPowerup) {
      const bx = bonusPowerup.x * cell + cell / 2;
      const by = bonusPowerup.y * cell + cell / 2;
      const pop = spawnScale(bonusSpawnAt);
      const r = cell * 0.32 * pop;
      ctx.fillStyle = '#ffd24a';
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI * 2);
      ctx.fill();
      if (pop > 0.4) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = `bold ${Math.round(cell * 0.42)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha = pop;
        ctx.fillText('+', bx, by + cell * 0.02);
        ctx.globalAlpha = 1;
      }
    }

    // food — radial gradient with pop-in scale on spawn
    if (food) {
      const fx = food.x * cell + cell / 2;
      const fy = food.y * cell + cell / 2;
      const pop = spawnScale(foodSpawnAt);
      const r = cell * 0.38 * pop;
      if (r > 0.5) {
        const grad = ctx.createRadialGradient(fx - r * 0.3, fy - r * 0.3, r * 0.1, fx, fy, r);
        grad.addColorStop(0, '#ff9d8a');
        grad.addColorStop(1, '#ff5d5d');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(fx, fy, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // brief expanding ring burst at the cell where food/powerup was just eaten
    if (eatPopCell && eatPopAt) {
      const elapsed = performance.now() - eatPopAt;
      if (elapsed < SPAWN_POP_MS) {
        const p = elapsed / SPAWN_POP_MS;
        const ex = eatPopCell.x * cell + cell / 2;
        const ey = eatPopCell.y * cell + cell / 2;
        const r = cell * 0.4 * (1 + p * 0.8);
        ctx.strokeStyle = `rgba(255,255,255,${0.5 * (1 - p)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ex, ey, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // snake — rendered at an interpolated position between its pre-tick and
    // post-tick grid cells, based on how far we are through the current tick
    // interval. This is purely visual: tick()/collision logic still operates
    // on whole grid cells exactly as before.
    const t = gameOver ? 1 : Math.min(1, acc / stepMs);
    const ghosting = ghostActiveMs > 0;

    // Death animation: if deathAnimAt is set, override normal snake rendering
    // with a staggered collapse — each segment flashes red and shrinks outward
    // from the head, creating a "disintegrate from front to back" effect.
    if (deathAnimAt && deathSnakeSnapshot) {
      const elapsed = performance.now() - deathAnimAt;
      const totalSegs = deathSnakeSnapshot.length;
      deathSnakeSnapshot.forEach((s, i) => {
        // Each segment starts its collapse slightly after the one before it
        const segDelay = (i / totalSegs) * DEATH_ANIM_MS * 0.6;
        const segElapsed = Math.max(0, elapsed - segDelay);
        const segProgress = Math.min(1, segElapsed / (DEATH_ANIM_MS * 0.5));
        if (segProgress <= 0) {
          // Not yet started — draw normally
          ctx.fillStyle = i === 0 ? '#6ef08a' : '#4ecb71';
        } else {
          // Flash: interpolate from green → red → transparent
          const r = Math.round(78 + (255 - 78) * Math.min(1, segProgress * 2));
          const g = Math.round(203 * (1 - segProgress));
          const b = Math.round(113 * (1 - segProgress));
          ctx.fillStyle = `rgba(${r},${g},${b},${1 - segProgress * 0.9})`;
        }
        const shrink = 1 - segProgress * 0.85;
        const px = s.x * cell;
        const py = s.y * cell;
        const pad = cell * 0.08;
        const w = (cell - pad * 2) * shrink;
        const h = (cell - pad * 2) * shrink;
        const ox = (cell - pad * 2 - w) / 2;
        const oy = (cell - pad * 2 - h) / 2;
        roundRect(ctx, px + pad + ox, py + pad + oy, w, h, cell * 0.22 * shrink);
        ctx.fill();
      });
      return; // skip normal snake rendering during death animation
    }

    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const p = prevSnake[i];
      let drawX = s.x, drawY = s.y;
      if (p) {
        const dx = s.x - p.x, dy = s.y - p.y;
        // A jump of more than 1 cell means a wrap-around teleport (Iranian
        // mode) — interpolating that would visibly slide the segment across
        // the whole board, so snap instead of lerp for that one frame.
        if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) {
          drawX = p.x + dx * t;
          drawY = p.y + dy * t;
        }
      }
      const px = drawX * cell;
      const py = drawY * cell;
      const pad = cell * 0.08;
      const isHead = i === 0;
      if (ghosting) {
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = isHead ? '#a8f0ff' : '#6fd8ec';
      } else if (isHead) {
        ctx.shadowColor = 'rgba(110, 240, 138, 0.5)';
        ctx.shadowBlur = cell * 0.4;
        ctx.fillStyle = '#6ef08a';
      } else {
        // Tapered gradient trail: opacity/lightness eases from head to tail
        // so the body reads as a continuous trail rather than uniform blocks.
        const frac = i / Math.max(1, snake.length - 1); // 0 near head, 1 at tail
        const lightness = 0.55 - frac * 0.18;
        ctx.fillStyle = `hsl(152, 55%, ${lightness * 100}%)`;
      }
      roundRect(ctx, px + pad, py + pad, cell - pad * 2, cell - pad * 2, cell * 0.22);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      if (isHead) {
        drawEyes({ x: drawX, y: drawY }, dir);
      }
    }
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  function drawEyes(head, d) {
    const cx = head.x * cell + cell / 2;
    const cy = head.y * cell + cell / 2;
    const off = cell * 0.18;
    // perpendicular offset for eye pair, forward offset toward direction
    const perpX = -d.y, perpY = d.x;
    const fwdX = d.x * off, fwdY = d.y * off;
    const e1x = cx + perpX * off + fwdX, e1y = cy + perpY * off + fwdY;
    const e2x = cx - perpX * off + fwdX, e2y = cy - perpY * off + fwdY;
    ctx.fillStyle = '#06210f';
    const r = cell * 0.08;
    ctx.beginPath(); ctx.arc(e1x, e1y, r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x, e2y, r, 0, Math.PI * 2); ctx.fill();
  }

  // ---- Loop ----
  function loop(ts) {
    if (!running || paused) return;
    if (!lastTs) lastTs = ts;
    let delta = ts - lastTs;
    lastTs = ts;
    // Clamp delta so a dropped/backgrounded tab doesn't fire many ticks at once
    if (delta > 250) delta = 250;

    if (WRAP) {
      // Powerup timers run on wall-clock time, independent of the grid tick
      // rate, so they're consistent regardless of difficulty speed.
      ghostSpawnTimer += delta;
      if (ghostSpawnTimer >= GHOST_INTERVAL_MS) {
        ghostSpawnTimer = 0;
        trySpawnGhostPowerup();
      }
      bonusSpawnTimer += delta;
      if (bonusSpawnTimer >= BONUS_INTERVAL_MS) {
        bonusSpawnTimer = 0;
        trySpawnBonusPowerup();
      }
      if (ghostActiveMs > 0) {
        ghostActiveMs = Math.max(0, ghostActiveMs - delta);
        ghostTimerEl.style.display = 'inline';
        ghostTimerEl.textContent = '👻 ' + Math.ceil(ghostActiveMs / 1000) + 's';
      } else {
        ghostTimerEl.style.display = 'none';
      }
    }

    acc += delta;
    while (acc >= stepMs) {
      tick();
      acc -= stepMs;
      if (gameOver) { acc = 0; break; }
    }
    render();
    if (!gameOver) rafId = requestAnimationFrame(loop);
  }

  function showOverlay(title, btnLabel, subtitle) {
    if (title !== 'Paused') {
      document.getElementById('diffRow').style.display = 'flex';
    }
    overlayTitle.textContent = title;
    startBtn.textContent = btnLabel;
    let sub = overlay.querySelector('#subtitle');
    if (subtitle) {
      if (!sub) {
        sub = document.createElement('p');
        sub.id = 'subtitle';
        overlay.insertBefore(sub, startBtn);
      }
      sub.textContent = subtitle;
    } else if (sub) {
      sub.remove();
    }
    overlay.classList.remove('hidden');
  }
  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  function start() {
    resizeCanvas();
    resetState();
    running = true;
    paused = false;
    lastTs = 0;
    hideOverlay();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', () => {
    Sound.init();
    Sound.click();
    start();
  });

  // Initial paint so board isn't blank behind the start overlay.
  // applyTheme() is called here (not at declaration time) because it needs
  // resizeCanvas()/render() which require game state to exist first.
  resizeCanvas();
  resetState();
  applyTheme();
  showOverlay('Snake', 'Start');
})();
</script>
</body>
</html>
